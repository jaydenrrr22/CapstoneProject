# =============================================================================
# TEMPLATE FILE — do NOT use directly in production without editing.
#
# Replace all occurrences of the placeholder values below before deploying:
#   YOUR_DOMAIN   → Your actual domain name (e.g. example.com)
#
# Steps:
#   1. Copy this file to your server's Nginx config directory.
#   2. Run:  sed -i 's/YOUR_DOMAIN/example.com/g' nginx-trace.conf
#   3. Obtain TLS certificates (e.g. via Certbot / Let's Encrypt):
#        certbot --nginx -d example.com -d www.example.com
#   4. Test the config:  nginx -t
#   5. Reload Nginx:     systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/trace;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
    }
}
